name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/

      - name: Test
        # DISCOGS_USERNAME enables VCR cassette replay in CI (not a secret — it's
        # a public profile name).  Set it under repo Settings → Variables → Actions.
        # VCR tests will be skipped gracefully if this variable is not set.
        # DISCOGS_TOKEN is intentionally absent from CI; integration tests skip.
        env:
          DISCOGS_USERNAME: ${{ vars.DISCOGS_USERNAME }}
        run: uv run pytest --cov=src --cov-report=term-missing
